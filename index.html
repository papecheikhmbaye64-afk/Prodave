  <body>
    <div id="app"></div>

    <script>
      const AppState = {
        currentView: "landing", currentUser: null, userType: null,
        projects: [], users: [], currentProject: null,
        showLoginModal: false, showForgotPasswordModal: false,
        showContactModal: false, showInvestmentModal: false, showDocumentModal: false,
        currentInvestor: null, contactMessage: "",
        investmentData: { amount: 0, percentage: 10 },
        adminCredentials: { username: "papecheickh", password: "ejs1234" },
        adminActiveTab: 'users', showAdminPasswordModal: false,
        showAdminDeleteModal: false, adminTargetUser: null,
      };

      const firebaseConfig = {
        apiKey: "AIzaSyBiJjIxiXm0i_hMie4C08MWC0I7MTSYKd4",
        authDomain: "prodave-99798.firebaseapp.com",
        projectId: "prodave-99798",
        storageBucket: "prodave-99798.firebasestorage.app",
        messagingSenderId: "194825469276",
        appId: "1:194825469276:web:b5882c3ef7699e054e5599",
        measurementId: "G-FZY64WB4BH",
      };
      firebase.initializeApp(firebaseConfig);
      const db = firebase.firestore();

      let syncTimer = null;
      function showSync(state, msg) {
        const el = document.getElementById("syncStatus");
        if (!el) return;
        el.className = "show " + state;
        const icons = { syncing: "⏳", synced: "✅", error: "❌" };
        el.innerHTML = icons[state] + " " + msg;
        clearTimeout(syncTimer);
        if (state !== "syncing") { syncTimer = setTimeout(() => { el.classList.remove("show"); }, 2500); }
      }

      async function loadUsersFromFirebase() {
        try { const s = await db.collection("users").get(); AppState.users = s.docs.map(d => ({ ...d.data(), _docId: d.id })); } catch(e) { console.warn(e); }
      }
      async function loadProjectsFromFirebase() {
        try { const s = await db.collection("projects").get(); AppState.projects = s.docs.map(d => ({ ...d.data(), _docId: d.id })); } catch(e) { console.warn(e); }
      }
      async function saveUserToFirebase(user) {
        try {
          showSync("syncing", "Synchronisation...");
          // ★ Ne pas envoyer le document base64 vers Firestore (trop lourd)
          const { _docId, financialDocumentData, ...data } = user;
          if (_docId) { await db.collection("users").doc(_docId).set(data); }
          else { const ref = await db.collection("users").add(data); user._docId = ref.id; }
          showSync("synced", "Synchronisé");
        } catch(e) { console.error(e); showSync("error", "Erreur de sync"); }
      }
      async function saveProjectToFirebase(project) {
        try {
          showSync("syncing", "Synchronisation...");
          const { _docId, image, ...data } = project;
          if (image && image.startsWith("data:")) { data.image = null; } else { data.image = image || null; }
          if (_docId) { await db.collection("projects").doc(_docId).set(data); }
          else { const ref = await db.collection("projects").add(data); project._docId = ref.id; }
          showSync("synced", "Synchronisé");
        } catch(e) { console.error(e); showSync("error", "Erreur de sync"); }
      }
      async function deleteProjectFromFirebase(projectId) {
        try { const p = AppState.projects.find(p => p.id === projectId); if (p && p._docId) await db.collection("projects").doc(p._docId).delete(); } catch(e) { console.error(e); }
      }

      // ★ Fusion images projets localStorage + Firestore
      function mergeLocalImages(firestoreProjects) {
        const stored = (() => { try { return JSON.parse(localStorage.getItem("prodave_projects") || "[]"); } catch { return []; } })();
        return firestoreProjects.map(fp => {
          const lp = stored.find(l => l.id === fp.id);
          if (lp && lp.image && lp.image.startsWith("data:")) return { ...fp, image: lp.image };
          return fp;
        });
      }

      // ★ Fusion documents financiers localStorage + Firestore
      function mergeLocalDocs(firestoreUsers) {
        const stored = (() => { try { return JSON.parse(localStorage.getItem("prodave_users") || "[]"); } catch { return []; } })();
        return firestoreUsers.map(fu => {
          const lu = stored.find(l => l.id === fu.id);
          if (lu && lu.financialDocumentData) return { ...fu, financialDocumentData: lu.financialDocumentData };
          return fu;
        });
      }

      function setupRealtimeListeners() {
        db.collection("projects").onSnapshot(snapshot => {
          AppState.projects = mergeLocalImages(snapshot.docs.map(d => ({ ...d.data(), _docId: d.id })));
          const views = ["porteur-dashboard", "investisseur-dashboard", "admin-dashboard"];
          if (views.includes(AppState.currentView)) render();
        }, err => console.warn(err));
        db.collection("users").onSnapshot(snapshot => {
          AppState.users = mergeLocalDocs(snapshot.docs.map(d => ({ ...d.data(), _docId: d.id })));
          if (AppState.currentView === "admin-dashboard") render();
          if (AppState.currentUser && AppState.currentUser.id) {
            const u = AppState.users.find(u => u.id === AppState.currentUser.id);
            if (u) { AppState.currentUser = u; localStorage.setItem("prodave_current_user", JSON.stringify(u)); }
          }
        }, err => console.warn(err));
      }

      const Icons = {
        trending: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 6l-9.5 9.5-5-5L1 18"/><path d="M17 6h6v6"/></svg>',

      // ★ Sauvegarde localStorage (avec financialDocumentData uniquement en local)
      async function saveToStorage() {
        localStorage.setItem("prodave_projects", JSON.stringify(AppState.projects));
        // Sauvegarder users AVEC financialDocumentData en localStorage
        localStorage.setItem("prodave_users", JSON.stringify(AppState.users));
        localStorage.setItem("prodave_current_user", JSON.stringify(AppState.currentUser));
      }

      async function loadStoredData() {
        try {
          const sp = localStorage.getItem("prodave_projects");
          const su = localStorage.getItem("prodave_users");
          const sc = localStorage.getItem("prodave_current_user");
          if (sp) { try { AppState.projects = JSON.parse(sp); } catch { AppState.projects = []; } }
          if (su) { try { AppState.users = JSON.parse(su); } catch { AppState.users = []; } }
          if (sc) {
            try {
              AppState.currentUser = JSON.parse(sc);
              if (AppState.currentUser) {
                if (AppState.currentUser.type === "admin") navigateTo("admin-dashboard");
                else navigateTo(AppState.currentUser.type === "porteur" ? "porteur-dashboard" : "investisseur-dashboard");
              }
            } catch { localStorage.removeItem("prodave_current_user"); AppState.currentUser = null; }
          }
          showSync("syncing", "Connexion à Firebase...");
          await loadUsersFromFirebase();
          await loadProjectsFromFirebase();
          // Fusionner images projets et documents financiers depuis localStorage
          const localProjects = (() => { try { return JSON.parse(localStorage.getItem("prodave_projects") || "[]"); } catch { return []; } })();
          AppState.projects = AppState.projects.map(fp => {
            const lp = localProjects.find(l => l.id === fp.id);
            if (lp && lp.image && lp.image.startsWith("data:")) return { ...fp, image: lp.image };
            return fp;
          });
          AppState.users = mergeLocalDocs(AppState.users);
          localStorage.setItem("prodave_projects", JSON.stringify(AppState.projects));
          localStorage.setItem("prodave_users", JSON.stringify(AppState.users));
          if (AppState.currentUser && AppState.currentUser.id) {
            const u = AppState.users.find(u => u.id === AppState.currentUser.id);
            if (u) { AppState.currentUser = u; localStorage.setItem("prodave_current_user", JSON.stringify(u)); }
          }
          showSync("synced", "Données synchronisées");
          render();
          setupRealtimeListeners();
        } catch(e) { console.error(e); showSync("error", "Mode hors-ligne"); }
      }

      function showLoginModal() { AppState.showLoginModal = true; render(); }
      function closeLoginModal() { AppState.showLoginModal = false; render(); }
      function showForgotPasswordModal() { AppState.showLoginModal = false; AppState.showForgotPasswordModal = true; render(); }
      function closeForgotPasswordModal() { AppState.showForgotPasswordModal = false; render(); }

      function handleLogin(event) {
        event.preventDefault();
        const fd = new FormData(event.target);
        const login = fd.get("email").trim();
        const password = fd.get("password");
        if ((login === AppState.adminCredentials.username || login === "admin@prodave.sn") && password === AppState.adminCredentials.password) {
          AppState.currentUser = { type: "admin", name: "Administrateur", email: "admin@prodave.sn" };
          AppState.userType = "admin";
          saveToStorage(); closeLoginModal(); navigateTo("admin-dashboard"); return;
        }
        const user = AppState.users.find(u => (u.email === login || u.username === login) && u.password === password);
        if (user) {
          AppState.currentUser = user; AppState.userType = user.type;
          saveToStorage(); closeLoginModal();
          navigateTo(user.type === "porteur" ? "porteur-dashboard" : "investisseur-dashboard");
        } else { alert("❌ Identifiant/email ou mot de passe incorrect"); }
      }

      function handleForgotPassword(event) {
        event.preventDefault();
        const fd = new FormData(event.target);
        const login = fd.get("email").trim();
        const user = AppState.users.find(u => u.email === login || u.username === login);
        if (user) { alert(`✅ Email envoyé à ${user.email}.\n\n(Démo : mot de passe = "${user.password}")`); closeForgotPasswordModal(); showLoginModal(); }
        else { alert("❌ Aucun compte trouvé"); }
      }

      function logout() { AppState.currentUser = null; AppState.userType = null; localStorage.removeItem("prodave_current_user"); navigateTo("landing"); }

      function adminSwitchTab(tab) { AppState.adminActiveTab = tab; render(); }

      function closeAdminPasswordModal() { AppState.showAdminPasswordModal = false; AppState.adminTargetUser = null; render(); }
      function handleAdminChangePassword(event) {
        event.preventDefault();
        const fd = new FormData(event.target);
        const np = fd.get('newPassword'), cp = fd.get('confirmPassword');
        if (np !== cp) { alert('❌ Les mots de passe ne correspondent pas.'); return; }
        if (np.length < 4) { alert('❌ Minimum 4 caractères.'); return; }
        const u = AppState.users.find(u => u.id === AppState.adminTargetUser.id);
        if (u) { u.password = np; saveToStorage(); saveUserToFirebase(u); closeAdminPasswordModal(); alert(`✅ Mot de passe de ${u.name} modifié.`); }

      function openAdminDeleteModal(userId) { AppState.adminTargetUser = AppState.users.find(u => u.id === userId); AppState.showAdminDeleteModal = true; render(); }
      function closeAdminDeleteModal() { AppState.showAdminDeleteModal = false; AppState.adminTargetUser = null; render(); }
      async function confirmDeleteUser() {
        const user = AppState.adminTargetUser; if (!user) return;
        try {
          if (user._docId) await db.collection('users').doc(user._docId).delete();
          AppState.users = AppState.users.filter(u => u.id !== user.id);
          if (user.type === 'porteur') {
            const ptd = AppState.projects.filter(p => p.ownerId === user.id);
            for (const p of ptd) { if (p._docId) await db.collection('projects').doc(p._docId).delete(); }
            AppState.projects = AppState.projects.filter(p => p.ownerId !== user.id);
          }
          saveToStorage(); closeAdminDeleteModal(); alert(`✅ Utilisateur ${user.name} supprimé.`);
        } catch(e) { console.error(e); alert('❌ Erreur lors de la suppression.'); }
      }
      function approveInvestor(id) {
        const inv = AppState.users.find(u => u.id === id);
        if (inv) { inv.documentsValidated = true; inv.canInvest = true; inv.validatedDate = new Date().toISOString(); saveToStorage(); saveUserToFirebase(inv); alert(`✅ ${inv.name} approuvé.`); render(); }
      }
      function rejectInvestor(id) {
        const inv = AppState.users.find(u => u.id === id);
        if (inv) { const r = prompt("Raison du rejet:"); if (r) { inv.documentsValidated = false; inv.canInvest = false; inv.rejectionReason = r; inv.rejectionDate = new Date().toISOString(); saveToStorage(); saveUserToFirebase(inv); alert(`❌ ${inv.name} rejeté.`); render(); } }

      // ★ Télécharger le document financier depuis le modal admin
      function downloadFinancialDoc(investorId) {
        const inv = AppState.users.find(u => u.id === investorId);
        if (!inv || !inv.financialDocumentData) { alert("❌ Document non disponible (uploadé avant cette version)."); return; }
        const a = document.createElement("a");
        a.href = inv.financialDocumentData;
        a.download = inv.financialDocument || "document_financier";
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
      }

      // ★ Inscription avec stockage du fichier en base64
      function handleSignup(event) {
        event.preventDefault();
        const fd = new FormData(event.target);
        const userData = {
          id: Date.now(),
          name: fd.get("name"),
          username: fd.get("username"),
          email: fd.get("email"),
          password: fd.get("password"),
          city: fd.get("city"),
          type: AppState.userType,
          createdAt: new Date().toISOString(),
        };
        if (AppState.users.some(u => u.email === userData.email)) { alert("❌ Un compte avec cet email existe déjà"); return; }
        if (AppState.users.some(u => u.username === userData.username)) { alert("❌ Cet identifiant est déjà utilisé"); return; }

        if (AppState.userType === "investisseur") {
          const nda = fd.get("ndaAccepted");
          if (!nda) { alert("❌ Vous devez accepter les règles de confidentialité"); return; }
          const docFile = fd.get("financialDocument");
          if (!docFile || docFile.size === 0) { alert("❌ Vous devez fournir un document financier"); return; }
          userData.ndaAccepted = true;
          userData.ndaAcceptedDate = new Date().toISOString();
          userData.financialDocument = docFile.name;
          userData.financialDocumentType = docFile.type;
          userData.documentsValidated = false;
          userData.canInvest = false;

          // ★ Lire le fichier en base64 pour le stocker localement
          const reader = new FileReader();
          reader.onload = function(e) {
            userData.financialDocumentData = e.target.result; // base64 complet
            AppState.users.push(userData);
            AppState.currentUser = userData;
            saveToStorage();
            saveUserToFirebase(userData); // Firebase sans financialDocumentData
            alert("✅ Inscription réussie!\n\n⚠️ Vos documents sont en cours de validation.");
            navigateTo("investisseur-dashboard");
          };
          reader.readAsDataURL(docFile);
          return; // attendre onload
        }

        AppState.users.push(userData);
        AppState.currentUser = userData;
        saveToStorage(); saveUserToFirebase(userData);
        alert("✅ Inscription réussie!");
        navigateTo("porteur-dashboard");
      }

      function handleCreateProject(event) {
        event.preventDefault();
        const fd = new FormData(event.target);
        const project = {
          id: Date.now(),
          title: fd.get("title"), description: fd.get("description"), objectives: fd.get("objectives"),
          category: fd.get("category"), budget: parseFloat(fd.get("budget")), city: fd.get("city"),
          status: "En recherche de financement", date: new Date().toLocaleDateString("fr-FR"),
          owner: AppState.currentUser.name, ownerId: AppState.currentUser.id,
          ownerEmail: AppState.currentUser.email, ownerCity: AppState.currentUser.city,
          image: null, investments: [],
        };
        const imageFile = fd.get("image");
        if (imageFile && imageFile.size > 0) {
          const reader = new FileReader();
          reader.onload = function(e) {
            project.image = e.target.result;
            AppState.projects.push(project);
            saveToStorage(); saveProjectToFirebase(project);
            alert("✅ Projet créé avec succès!"); navigateTo("porteur-dashboard");
          };
          reader.readAsDataURL(imageFile);
        } else {
          AppState.projects.push(project);
          saveToStorage(); saveProjectToFirebase(project);
          alert("✅ Projet créé avec succès!"); navigateTo("porteur-dashboard");
        }
      }

      function editProject(id) { AppState.currentProject = AppState.projects.find(p => p.id === id); navigateTo("create-project"); }
      function deleteProject(id) {

      function openInvestmentModal() {

        AppState.showInvestmentModal = true; render();
      }
      function closeInvestmentModal() { AppState.showInvestmentModal = false; AppState.investmentData = { amount: 0, percentage: 10 }; render(); }
      function updateInvestmentPercentage(event) {
        const pct = parseFloat(event.target.value);
        AppState.investmentData.percentage = pct; AppState.investmentData.amount = (AppState.currentProject.budget * pct) / 100;
        const a = document.getElementById("investmentAmount"); const p = document.getElementById("percentageDisplay");
        if (a) a.textContent = formatCurrency(AppState.investmentData.amount);
        if (p) p.textContent = pct;
      }
      function handleInvestment(event) {
        event.preventDefault();
        const fd = new FormData(event.target);
        const pct = parseFloat(fd.get("percentage"));
        if (!fd.get("paymentConfirmed")) { alert("❌ Confirmez le paiement"); return; }
        if (pct < 1 || pct > 100) { alert("❌ Pourcentage entre 1 et 100"); return; }
        const inv = { id: Date.now(), investorId: AppState.currentUser.id, investorName: AppState.currentUser.name, investorEmail: AppState.currentUser.email, projectId: AppState.currentProject.id, percentage: pct, amount: AppState.investmentData.amount, date: new Date().toISOString(), paymentConfirmed: true, contractSigned: true };
        const idx = AppState.projects.findIndex(p => p.id === AppState.currentProject.id);
        if (idx !== -1) {
          if (!AppState.projects[idx].investments) AppState.projects[idx].investments = [];
          AppState.projects[idx].investments.push(inv);
          const total = AppState.projects[idx].investments.reduce((s, i) => s + i.percentage, 0);
          AppState.projects[idx].status = total >= 100 ? "Financé" : `${Math.round(total)}% financé`;
        }
        saveToStorage();
        const up = AppState.projects.find(p => p.id === AppState.currentProject.id);
        if (up) saveProjectToFirebase(up);
        alert(`✅ Investissement de ${pct}% (${formatCurrency(inv.amount)}) confirmé!`);
        closeInvestmentModal(); navigateTo("investisseur-dashboard");
      }

                  <div class="p-6 space-y-4">${AppState.projects.map(p=>{
                    const ti=p.investments?p.investments.reduce((s,i)=>s+i.percentage,0):0;
                    return `<div style="border:1px solid #e5e7eb;border-radius:1rem;padding:1.25rem;background:#fafafa;" class="flex flex-col gap-3"><div class="flex justify-between items-start gap-4 flex-wrap"><div class="flex gap-3 flex-1">${p.image?`<div style="width:4rem;height:4rem;border-radius:.625rem;overflow:hidden;flex-shrink:0;background:#f3f4f6;"><img src="${p.image}" alt="${p.title}" style="width:100%;height:100%;object-fit:cover;" onerror="this.style.display='none';" /></div>`:''}<div class="flex-1"><div class="flex items-center gap-2 mb-1 flex-wrap"><span style="background:linear-gradient(135deg,rgba(102,126,234,.1),rgba(118,75,162,.1));color:#667eea;border:1px solid rgba(102,126,234,.25);padding:.2rem .625rem;border-radius:9999px;font-size:.72rem;font-weight:700;">${p.category}</span><span style="background:${ti>=100?'#f0fdf4':'#fafbff'};color:${ti>=100?'#16a34a':'#667eea'};border:1px solid ${ti>=100?'#bbf7d0':'#ddd6fe'};padding:.2rem .625rem;border-radius:9999px;font-size:.72rem;font-weight:700;">${p.status}</span></div><h3 class="font-black text-lg font-display">${p.title}</h3><p class="text-sm text-gray-500">${p.owner} • ${p.city}</p><p class="text-sm text-gray-600 mt-1">${formatCurrency(p.budget)} • ${ti}% financé</p></div></div><button onclick="deleteProject(${p.id})" style="padding:.45rem .9rem;background:#fef2f2;color:#dc2626;border:1px solid #fecaca;border-radius:.625rem;font-size:.78rem;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:.35rem;flex-shrink:0;"><div class="icon" style="width:1rem;height:1rem;">${Icons.trash}</div> Supprimer</button></div><div class="progress-bar"><div class="progress-fill" style="width:${Math.min(ti,100)}%;"></div></div>${p.investments&&p.investments.length>0?`<p class="text-xs text-gray-500">${p.investments.length} investissement(s) • ${formatCurrency((p.budget*ti)/100)} levés</p>`:'<p class="text-xs text-gray-400">Aucun investissement pour le moment</p>'}</div>`;
                  }).join('')}</div>`}
              </div>` : ''}
            </div>
            ${AppState.showDocumentModal ? renderDocumentModal() : ''}
            ${AppState.showAdminPasswordModal ? renderAdminPasswordModal() : ''}
            ${AppState.showAdminDeleteModal ? renderAdminDeleteModal() : ''}
          </div>`;
      }

      function renderAdminPasswordModal() {
        const u = AppState.adminTargetUser; if (!u) return '';
        return `
          <div class="modal-backdrop animate-fade-in"><div class="modal animate-scale-in" style="max-width:420px;">
            <div class="flex justify-between items-center mb-5"><div><h3 class="text-2xl font-black font-display">Changer le mot de passe</h3><p class="text-sm text-gray-500 mt-1">Pour : <strong>${u.name}</strong> (${u.email})</p></div><button onclick="closeAdminPasswordModal()" class="btn" style="width:2.25rem;height:2.25rem;padding:0;background:#f3f4f6;color:#374151;border-radius:50%;"><div class="icon">${Icons.x}</div></button></div>
            <form onsubmit="handleAdminChangePassword(event)" class="space-y-4">
              <div><label class="block text-sm font-semibold text-gray-700 mb-2">Nouveau mot de passe</label><input type="password" name="newPassword" required class="input" placeholder="Minimum 4 caractères" /></div>
              <div><label class="block text-sm font-semibold text-gray-700 mb-2">Confirmer</label><input type="password" name="confirmPassword" required class="input" placeholder="Répéter le mot de passe" /></div>
              <div class="flex gap-3 mt-2"><button type="submit" class="btn btn-primary flex-1"><div class="icon">${Icons.check}</div><span style="margin-left:.4rem;">Enregistrer</span></button><button type="button" onclick="closeAdminPasswordModal()" class="btn flex-1" style="background:#f3f4f6;color:#374151;">Annuler</button></div>
            </form>
          </div></div>`;
      }

      function renderAdminDeleteModal() {
        const u = AppState.adminTargetUser; if (!u) return '';
        return `
          <div class="modal-backdrop animate-fade-in"><div class="modal animate-scale-in" style="max-width:400px;text-align:center;">
            <div style="width:4rem;height:4rem;background:#fef2f2;border:2px solid #fecaca;border-radius:1rem;display:flex;align-items:center;justify-content:center;margin:0 auto 1.25rem;font-size:1.75rem;">🗑️</div>
            <h3 class="text-2xl font-black font-display mb-2">Supprimer l'utilisateur ?</h3>
            <p class="text-gray-600 mb-1">Vous êtes sur le point de supprimer :</p>
            <p class="font-bold text-gray-800 mb-1">${u.name}</p>
            <p class="text-sm text-gray-500 mb-5">${u.email}</p>
            <p class="text-sm text-red-600 bg-red-50 rounded-xl p-3 mb-6 border border-red-100">⚠️ Cette action est irréversible.${u.type==='porteur'?' Tous ses projets seront également supprimés.':''}</p>
            <div class="flex gap-3"><button onclick="closeAdminDeleteModal()" class="btn flex-1" style="background:#f3f4f6;color:#374151;">Annuler</button><button onclick="confirmDeleteUser()" class="btn flex-1" style="background:#dc2626;color:white;"><div class="icon">${Icons.trash}</div><span style="margin-left:.4rem;">Supprimer</span></button></div>
          </div></div>`;
      }

      // ★ MODIFICATION PRINCIPALE — Modal document avec visionneuse intégrée
      function renderDocumentModal() {
        const inv = AppState.currentInvestor; if (!inv) return "";

        const hasDoc = !!(inv.financialDocumentData);
        const docType = inv.financialDocumentType || "";
        const isImage = docType.startsWith("image/");
        const isPdf = docType === "application/pdf";
        const docName = inv.financialDocument || "document_financier";

        // Construire le bloc de visualisation
        let docViewer = "";
        if (hasDoc) {
          if (isImage) {
            docViewer = `
              <div style="margin-bottom:1rem;">
                <img src="${inv.financialDocumentData}" alt="Document financier" class="doc-viewer-img" />
              </div>`;
          } else if (isPdf) {
            docViewer = `
              <div style="margin-bottom:1rem;">
                <iframe src="${inv.financialDocumentData}" class="doc-viewer-frame" title="Document financier PDF"></iframe>
              </div>`;
          } else {
            // Autre type — bouton de téléchargement uniquement
            docViewer = `
              <div class="doc-viewer-placeholder" style="margin-bottom:1rem;">
                <div class="icon-xl" style="color:#9ca3af;">${Icons.file}</div>
                <p class="font-semibold text-gray-600">${docName}</p>
                <p class="text-sm text-gray-400">Aperçu non disponible pour ce type de fichier</p>
              </div>`;
          }
        } else {
          docViewer = `
            <div class="doc-viewer-placeholder" style="margin-bottom:1rem;">
              <div class="icon-xl" style="color:#d1d5db;">${Icons.file}</div>
              <p class="font-semibold text-gray-500">Document non disponible</p>
              <p class="text-sm text-gray-400" style="max-width:280px;">Ce document a été soumis avant la mise à jour de la plateforme ou sur un autre appareil.</p>
            </div>`;
        }

        return `
          <div class="modal-backdrop animate-fade-in">
            <div class="modal animate-scale-in" style="max-width:760px;width:95%;">
              <div class="flex justify-between items-center mb-6">
                <div>
                  <h3 class="text-2xl font-black font-display">Dossier de ${inv.name}</h3>
                  ${inv.username ? `<p class="text-sm font-semibold" style="color:#667eea;margin-top:2px;">@${inv.username}</p>` : ""}
                </div>
                <button onclick="closeDocumentModal()" class="btn" style="width:2.5rem;height:2.5rem;padding:0;background:#f3f4f6;color:#374151;border-radius:50%;"><div class="icon">${Icons.x}</div></button>
              </div>

              <div class="space-y-5">
                <!-- Infos personnelles -->
                <div class="bg-blue-50 rounded-2xl p-5 border-2 border-blue-200">
                  <h4 class="font-bold mb-3 flex items-center gap-2"><div class="icon text-blue-600">${Icons.users}</div>Informations personnelles</h4>
                  <div class="grid gap-2 text-sm" style="grid-template-columns:repeat(auto-fit,minmax(200px,1fr));">
                    <p><span class="font-semibold text-gray-600">Nom :</span> ${inv.name}</p>
                    ${inv.username?`<p><span class="font-semibold text-gray-600">Identifiant :</span> <span style="color:#667eea;font-weight:600;">@${inv.username}</span></p>`:''}
                    <p><span class="font-semibold text-gray-600">Email :</span> ${inv.email}</p>
                    <p><span class="font-semibold text-gray-600">Ville :</span> ${inv.city}</p>
                    <p><span class="font-semibold text-gray-600">Inscription :</span> ${new Date(inv.createdAt).toLocaleDateString("fr-FR",{dateStyle:"full"})}</p>
                    <p><span class="font-semibold text-gray-600">NDA :</span> ${inv.ndaAccepted?`<span style="color:#16a34a;">✓ Accepté le ${new Date(inv.ndaAcceptedDate).toLocaleDateString("fr-FR")}</span>`:"<span style='color:#dc2626;'>✗ Non accepté</span>"}</p>
                  </div>
                </div>

                <!-- Document financier -->
                <div class="bg-purple-50 rounded-2xl p-5 border-2 border-purple-200">
                  <div class="flex items-center justify-between mb-4 flex-wrap gap-3">
                    <h4 class="font-bold flex items-center gap-2"><div class="icon text-purple-600">${Icons.filePdf}</div>Document financier</h4>
                    <div class="flex gap-2 flex-wrap">
                      ${hasDoc ? `
                        <button onclick="downloadFinancialDoc(${inv.id})" class="btn" style="background:linear-gradient(135deg,#667eea,#764ba2);color:white;font-size:.8rem;padding:.5rem 1rem;">
                          <div class="icon" style="width:1rem;height:1rem;">${Icons.download}</div><span style="margin-left:.4rem;">Télécharger</span>
                        </button>
                        ${isImage ? `
                          <button onclick="window.open('${inv.financialDocumentData}','_blank')" class="btn" style="background:#eff6ff;color:#2563eb;border:1px solid #bfdbfe;font-size:.8rem;padding:.5rem 1rem;">
                            <div class="icon" style="width:1rem;height:1rem;">${Icons.zoomIn}</div><span style="margin-left:.4rem;">Plein écran</span>
                          </button>` : ""}
                        ${isPdf ? `
                          <button onclick="window.open('${inv.financialDocumentData}','_blank')" class="btn" style="background:#eff6ff;color:#2563eb;border:1px solid #bfdbfe;font-size:.8rem;padding:.5rem 1rem;">
                            <div class="icon" style="width:1rem;height:1rem;">${Icons.eye}</div><span style="margin-left:.4rem;">Ouvrir PDF</span>
                          </button>` : ""}
                      ` : ""}
                    </div>
                  </div>
                  <p class="text-xs text-gray-500 mb-3">
                    ${hasDoc ? `<span style="background:#f0fdf4;color:#16a34a;border:1px solid #bbf7d0;padding:.15rem .5rem;border-radius:9999px;font-weight:600;">✓ Disponible</span> — <strong>${docName}</strong> (${isImage?"Image":isPdf?"PDF":"Fichier"})` : `<span style="background:#fef2f2;color:#dc2626;border:1px solid #fecaca;padding:.15rem .5rem;border-radius:9999px;font-weight:600;">⚠ Non disponible</span> — ${docName}`}
                  </p>
                  ${docViewer}
                </div>

                <!-- Statut et décision -->
                <div class="bg-gray-50 rounded-2xl p-5 border-2 border-gray-200">
                  <div class="flex items-center justify-between flex-wrap gap-3">
                    <div>
                      <h4 class="font-bold mb-2">Statut actuel</h4>
                      <div class="flex items-center gap-2">
                        ${inv.documentsValidated?`<span class="px-4 py-2 bg-green-500 text-white rounded-xl font-bold text-sm">✓ Approuvé</span>`:inv.rejectionReason?`<span class="px-4 py-2 bg-red-500 text-white rounded-xl font-bold text-sm">✗ Rejeté</span>`:`<span class="px-4 py-2 bg-yellow-500 text-white rounded-xl font-bold text-sm">⏳ En attente</span>`}
                      </div>
                      ${inv.rejectionReason?`<p class="mt-2 text-sm text-red-600"><span class="font-semibold">Raison :</span> ${inv.rejectionReason}</p>`:""}
                    </div>
                    ${!inv.documentsValidated&&!inv.rejectionReason?`
                      <div class="flex gap-2 flex-wrap">
                        <button onclick="approveInvestor(${inv.id});closeDocumentModal();" class="btn btn-success" style="font-size:.85rem;"><div class="icon" style="width:1rem;height:1rem;">${Icons.check}</div><span style="margin-left:.4rem;">Approuver</span></button>
                        <button onclick="rejectInvestor(${inv.id});closeDocumentModal();" class="btn" style="background:#ef4444;color:white;font-size:.85rem;"><div class="icon" style="width:1rem;height:1rem;">${Icons.xCircle}</div><span style="margin-left:.4rem;">Rejeter</span></button>
                      </div>`:""}
                  </div>
                </div>

                <button onclick="closeDocumentModal()" class="btn w-full" style="background:#e5e7eb;color:#374151;">Fermer</button>
              </div>
            </div>
          </div>`;
      }

      function display() {
        const ex = document.getElementById("mobileBottomNav"); if (ex) ex.remove();
        if (!AppState.currentUser || window.innerWidth > 640) return;
        const u = AppState.currentUser;
        let nav = [];
        if (u.type==="porteur") nav = [{label:"Accueil",icon:Icons.trending,action:"navigateTo('porteur-dashboard')",view:"porteur-dashboard"},{label:"Nouveau",icon:Icons.plus,action:"navigateTo('create-project')",view:"create-project"},{label:"Profil",icon:Icons.users,action:"",view:""},{label:"Déconnexion",icon:Icons.logOut,action:"logout()",view:""}];
        else if (u.type==="investisseur") nav = [{label:"Projets",icon:Icons.briefcase,action:"navigateTo('investisseur-dashboard')",view:"investisseur-dashboard"},{label:"Favoris",icon:Icons.checkCircle,action:"navigateTo('investisseur-dashboard')",view:""},{label:"Profil",icon:Icons.users,action:"",view:""},{label:"Déconnexion",icon:Icons.logOut,action:"logout()",view:""}];
        else if (u.type==="admin") nav = [{label:"Dashboard",icon:Icons.settings,action:"navigateTo('admin-dashboard')",view:"admin-dashboard"},{label:"Projets",icon:Icons.briefcase,action:"navigateTo('admin-dashboard')",view:""},{label:"Déconnexion",icon:Icons.logOut,action:"logout()",view:""}];
        if (!nav.length) return;
        const el = document.createElement("nav"); el.id = "mobileBottomNav"; el.className = "mobile-bottom-nav";
        el.innerHTML = nav.map(item=>`<button onclick="${item.action}" class="${item.view===AppState.currentView?"active":""}"><span class="nav-icon">${item.icon}</span><span>${item.label}</span></button>`).join("");
        document.body.appendChild(el);
        const app = document.getElementById("app"); if (app) app.classList.add("has-bottom-nav");
      }

      function render() {
        const app = document.getElementById("app");
        let content = "";
        switch (AppState.currentView) {
          case "landing": content = renderLanding(); break;
          case "choose-profile": content = renderChooseProfile(); break;
          case "signup": content = renderSignup(); break;
          case "porteur-dashboard": content = renderPorteurDashboard(); break;
          case "create-project": content = renderCreateProject(); break;
          case "investisseur-dashboard": content = renderInvestisseurDashboard(); break;
          case "project-detail": content = renderProjectDetail(); break;
          case "admin-dashboard": content = renderAdminDashboard(); break;
          default: content = renderLanding();
        }
        app.innerHTML = content;
        display();
      }

      (async function init() {
        try { render(); await loadStoredData(); }
        catch(e) { console.error(e); document.getElementById("app").innerHTML = `<div style="padding:40px;text-align:center;"><h1 style="color:red;">Erreur</h1><p>${e.message}</p></div>`; }
      })();
    </script>
  </body>
</html>
