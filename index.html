                            }
                            
                            <div class="flex flex-wrap gap-3 mb-6">
                                <span class="badge badge-purple">${project.category}</span>
                                <span class="badge ${isFullyFunded ? "badge-success" : ""}" style="${!isFullyFunded ? "background: linear-gradient(to right, #22c55e, #10b981); color: white; border: none;" : ""}">${project.status}</span>
                                ${
                                  !isFullyFunded
                                    ? `
                                    <span class="badge" style="background: linear-gradient(135deg, rgba(59, 130, 246, 0.1) 0%, rgba(37, 99, 235, 0.1) 100%); border: 1px solid rgba(59, 130, 246, 0.3); color: #2563eb;">
                                        ${remainingPercentage}% disponible
                                    </span>
                                `
                                    : ""
                                }
                            </div>

                            <h1 class="text-5xl font-black mb-6 font-display">
                                ${project.title}
                            </h1>

                            ${
                              totalInvested > 0
                                ? `
                                <div class="mb-8 p-6 rounded-2xl border-2" style="background: linear-gradient(to bottom right, #faf5ff, #fce7f3); border-color: #ddd6fe;">
                                    <div class="flex justify-between items-center mb-3">
                                        <span class="text-gray-700 font-semibold">Progression du financement</span>
                                        <span class="text-2xl font-black text-purple-600">${totalInvested}%</span>
                                    </div>
                                    <div class="progress-bar" style="height: 1rem;">
                                        <div class="progress-fill" style="width: ${totalInvested}%; height: 1rem;"></div>
                                    </div>
                                    <p class="text-sm text-gray-600 mt-2">
                                        ${formatCurrency((project.budget * totalInvested) / 100)} levés sur ${formatCurrency(project.budget)}
                                    </p>
                                </div>
                            `
                                : ""
                            }

                            <div class="grid grid-cols-1 gap-6 mb-8" style="grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));">
                                <div class="flex items-center gap-3">
                                    <div class="logo-container gradient-bg" style="width: 3.5rem; height: 3.5rem; flex-shrink: 0;">
                                        <div class="icon-lg text-white">${Icons.mapPin}</div>
                                    </div>
                                    <div>
                                        <p class="text-sm text-gray-500 font-medium">Localisation</p>
                                        <p class="font-bold text-lg">${project.city}</p>
                                    </div>
                                </div>

                                <div class="flex items-center gap-3">
                                    <div class="logo-container gradient-bg-alt" style="width: 3.5rem; height: 3.5rem; flex-shrink: 0;">
                                        <div class="icon-lg text-white">${Icons.dollar}</div>
                                    </div>
                                    <div>
                                        <p class="text-sm text-gray-500 font-medium">Budget estimé</p>
                                        <p class="font-bold text-lg">${formatCurrency(project.budget)}</p>
                                    </div>
                                </div>

                                <div class="flex items-center gap-3">
                                    <div class="logo-container" style="width: 3.5rem; height: 3.5rem; flex-shrink: 0; background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);">
                                        <div class="icon-lg text-white">${Icons.calendar}</div>
                                    </div>
                                    <div>
                                        <p class="text-sm text-gray-500 font-medium">Date de création</p>
                                        <p class="font-bold text-lg">${project.date}</p>
                                    </div>
                                </div>
                            </div>

                            <div class="mb-8">
                                <h2 class="text-3xl font-bold mb-4 font-display">Description du projet</h2>
                                <p class="text-gray-700 leading-relaxed text-lg">${project.description}</p>
                            </div>

                            <div class="mb-8">
                                <h2 class="text-3xl font-bold mb-4 font-display">Objectifs et impacts attendus</h2>
                                <p class="text-gray-700 leading-relaxed text-lg">${project.objectives}</p>
                            </div>

                            <div class="p-6 rounded-2xl border-2 mb-8" style="background: linear-gradient(to bottom right, #faf5ff, #fce7f3); border-color: #ddd6fe;">
                                <h3 class="font-bold mb-3 flex items-center gap-2 text-lg">
                                    <div class="icon text-purple-600">${Icons.users}</div>
                                    Porteur de projet
                                </h3>
                                <p class="text-gray-700 mb-1"><span class="font-semibold">Nom:</span> ${project.owner}</p>
                                <p class="text-gray-700"><span class="font-semibold">Localisation:</span> ${project.ownerCity}</p>
                            </div>

                            ${
                              project.investments &&
                              project.investments.length > 0
                                ? `
                                <div class="bg-green-50 rounded-2xl p-6 mb-8 border-2 border-green-200">
                                    <h3 class="font-bold mb-4 flex items-center gap-2 text-lg text-green-800">
                                        <div class="icon text-green-600">${Icons.checkCircle}</div>
                                        Investissements actuels (${project.investments.length})
                                    </h3>
                                    <div class="space-y-2">
                                        ${project.investments
                                          .map(
                                            (inv) => `
                                            <div class="flex justify-between items-center p-3 bg-white rounded-xl">
                                                <span class="font-semibold">${inv.investorName}</span>
                                                <div class="text-right">
                                                    <p class="font-bold text-green-600">${inv.percentage}%</p>
                                                    <p class="text-sm text-gray-600">${formatCurrency(inv.amount)}</p>
                                                </div>
                                            </div>
                                        `,
                                          )
                                          .join("")}
                                    </div>
                                </div>
                            `
                                : ""
                            }

                            <div class="bg-blue-50 rounded-2xl p-6 mb-8 border-2 border-blue-200">
                                <div class="flex items-start gap-3">
                                    <div class="icon text-blue-600">${Icons.shield}</div>
                                    <div>
                                        <h3 class="font-bold mb-2 text-lg">Protection des idées</h3>
                                        <p class="text-sm text-gray-600 leading-relaxed">
                                            Vous êtes soumis aux règles NDA. Les détails sensibles du projet ne peuvent être divulgués. Toute violation peut entraîner des sanctions.
                                        </p>
                                    </div>
                                </div>
                            </div>

                            <div class="flex flex-col gap-4">
                                ${
                                  !isFullyFunded
                                    ? `
                                    <button onclick="openInvestmentModal()" class="btn btn-primary w-full ${!canInvest ? "opacity-50 cursor-not-allowed" : ""}" style="font-size: 1.125rem; padding: 1.25rem;">
                                        <div class="icon-lg">${Icons.dollar}</div>
                                        <span style="margin-left: 0.5rem;">${canInvest ? "Investir dans ce projet" : "En attente de validation"}</span>
                                    </button>
                                `
                                    : `
                                    <div class="btn w-full" style="background: #e5e7eb; color: #6b7280; cursor: not-allowed; font-size: 1.125rem; padding: 1.25rem;">
                                        <div class="icon-lg">${Icons.checkCircle}</div>
                                        <span style="margin-left: 0.5rem;">Projet entièrement financé</span>
                                    </div>
                                `
                                }
                                <button onclick="openContactModal()" class="btn w-full" style="background: white; border: 2px solid #667eea; color: #667eea; font-size: 1.125rem; padding: 1.25rem;">
                                    <div class="icon-lg">${Icons.mail}</div>
                                    <span style="margin-left: 0.5rem;">Contacter le porteur</span>
                                </button>
                            </div>
                        </div>
                    </div>

                    ${AppState.showContactModal ? renderContactModal() : ""}
                    ${AppState.showInvestmentModal ? renderInvestmentModal() : ""}
                </div>
            `;
      }

      function renderContactModal() {
        return `
                <div class="modal-backdrop animate-fade-in">
                    <div class="modal animate-scale-in">
                        <div class="flex justify-between items-center mb-6">
                            <h3 class="text-3xl font-black font-display">Contacter le porteur</h3>
                            <button onclick="closeContactModal()" class="btn" style="width: 2.5rem; height: 2.5rem; padding: 0; background: #f3f4f6; color: #374151; border-radius: 50%;">
                                <div class="icon">${Icons.x}</div>
                            </button>
                        </div>

                        <p class="text-gray-600 mb-6">Présentez-vous et expliquez votre intérêt pour ce projet</p>

                        <textarea 
                            oninput="AppState.contactMessage = this.value" 
                            rows="6" 
                            placeholder="Bonjour,&#10;&#10;Je suis [votre nom], investisseur intéressé par votre projet. J'aimerais en savoir plus sur...&#10;&#10;Cordialement" 
                            class="textarea mb-6"
                        ></textarea>

                        <div class="flex flex-col gap-3">
                            <button onclick="sendMessage()" class="btn btn-primary w-full">
                                <div class="icon">${Icons.send}</div>
                                <span style="margin-left: 0.5rem;">Envoyer le message</span>
                            </button>
                            <button onclick="closeContactModal()" class="btn w-full" style="background: #e5e7eb; color: #374151;">
                                Annuler
                            </button>
                        </div>
                    </div>
                </div>
            `;
      }

      function renderInvestmentModal() {
        const project = AppState.currentProject;
        const totalInvested = project.investments
          ? project.investments.reduce((sum, inv) => sum + inv.percentage, 0)
          : 0;
        const remainingPercentage = 100 - totalInvested;

        return `
                <div class="modal-backdrop animate-fade-in">
                    <div class="modal animate-scale-in" style="max-width: 600px; max-height: 90vh; overflow-y: auto;">
                        <div class="flex justify-between items-center mb-6">
                            <h3 class="text-3xl font-black font-display">Investir dans le projet</h3>
                            <button onclick="closeInvestmentModal()" class="btn" style="width: 2.5rem; height: 2.5rem; padding: 0; background: #f3f4f6; color: #374151; border-radius: 50%;">
                                <div class="icon">${Icons.x}</div>
                            </button>
                        </div>

                        <div class="bg-purple-50 rounded-2xl p-6 mb-6 border-2 border-purple-200">
                            <h4 class="font-bold mb-2">Informations du projet</h4>
                            <p class="text-gray-700 mb-1"><span class="font-semibold">Projet:</span> ${project.title}</p>
                            <p class="text-gray-700 mb-1"><span class="font-semibold">Budget total:</span> ${formatCurrency(project.budget)}</p>
                            <p class="text-gray-700"><span class="font-semibold">Disponible:</span> ${remainingPercentage}% (${formatCurrency((project.budget * remainingPercentage) / 100)})</p>
                        </div>

                        <form onsubmit="handleInvestment(event)" class="space-y-6">
                            <div>
                                <label class="block text-sm font-semibold text-gray-700 mb-2">
                                    Tranche d'investissement * (1% - ${remainingPercentage}%)
                                </label>
                                <div class="flex items-center gap-4">
                                    <input 
                                        type="range" 
                                        name="percentage" 
                                        min="1" 
                                        max="${remainingPercentage}" 
                                        value="10" 
                                        oninput="updateInvestmentPercentage(event)"
                                        class="flex-1"
                                        style="height: 0.75rem; background: #e5e7eb; border-radius: 9999px; appearance: none; cursor: pointer;"
                                    />
                                    <div class="px-4 py-2 bg-purple-100 text-purple-700 rounded-xl font-bold text-center" style="min-width: 6rem;">
                                        <span id="percentageDisplay">10</span>%
                                    </div>
                                </div>
                            </div>

                            <div class="bg-blue-50 rounded-2xl p-6 border-2 border-blue-200">
                                <h4 class="font-bold mb-3 flex items-center gap-2">
                                    <div class="icon text-blue-600">${Icons.dollar}</div>
                                    Montant de votre investissement
                                </h4>
                                <p class="text-3xl font-black text-blue-600" id="investmentAmount">${formatCurrency(project.budget * 0.1)}</p>
                            </div>

                            <div class="bg-yellow-50 rounded-2xl p-6 border-2 border-yellow-200">
                                <div class="flex items-start gap-3 mb-4">
                                    <div class="icon text-yellow-600">${Icons.alertTriangle}</div>
                                    <div>
                                        <h4 class="font-bold mb-2">Conditions d'investissement</h4>
                                        <div class="text-sm text-gray-700 space-y-2">
                                            <p>✓ Le paiement est <strong>obligatoire</strong> pour valider votre investissement</p>
                                            <p>✓ Un <strong>contrat</strong> sera généré automatiquement</p>
                                            <p>✓ Votre tranche d'investissement sera <strong>enregistrée</strong> dans le contrat</p>
                                            <p>✓ Vous recevrez une <strong>confirmation</strong> par email</p>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            <div class="bg-green-50 rounded-2xl p-6 border-2 border-green-200">
                                <label class="flex items-start gap-3 cursor-pointer">
                                    <input type="checkbox" name="paymentConfirmed" required class="checkbox" style="margin-top: 0.25rem;" />
                                    <div>
                                        <p class="font-semibold mb-1">
                                            Je confirme le paiement de mon investissement *
                                        </p>
                                        <p class="text-sm text-gray-600">
                                            En cochant cette case, je confirme que je procéderai au paiement du montant indiqué pour finaliser mon investissement.
                                        </p>
                                    </div>
                                </label>
                            </div>

                            <div class="flex flex-col gap-3">
                                <button type="submit" class="btn btn-success w-full">
                                    <div class="icon">${Icons.checkCircle}</div>
                                    <span style="margin-left: 0.5rem;">Confirmer l'investissement</span>
                                </button>
                                <button type="button" onclick="closeInvestmentModal()" class="btn w-full" style="background: #e5e7eb; color: #374151;">
                                    Annuler
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            `;
      }

      // ============================================
      // INTERFACE ADMINISTRATEUR
      // ============================================
      function renderAdminDashboard() {
        const pendingInvestors = AppState.users.filter(
          (u) =>
            u.type === "investisseur" &&
            u.documentsValidated === false &&
            !u.rejectionReason,
        );
        const approvedInvestors = AppState.users.filter(
          (u) => u.type === "investisseur" && u.documentsValidated === true,
        );
        const rejectedInvestors = AppState.users.filter(
          (u) => u.type === "investisseur" && u.rejectionReason,
        );
        const allInvestors = AppState.users.filter(
          (u) => u.type === "investisseur",
        );
        const porteurs = AppState.users.filter((u) => u.type === "porteur");

        return `
                <div class="min-h-screen" style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);">
                    <!-- Header Admin -->
                    <nav class="bg-white shadow-lg sticky top-0 z-50">
                        <div class="container">
                            <div class="flex justify-between items-center py-4">
                                <div class="flex items-center gap-3">
                                    <div class="icon-lg text-purple-600">${Icons.settings}</div>
                                    <div>
                                        <h1 class="text-2xl font-black font-display text-purple-600">Administration</h1>
                                        <p class="text-sm text-gray-600">Panneau de contrôle</p>
                                    </div>
                                </div>
                                <button onclick="logout()" class="btn" style="background: #f3f4f6; color: #374151;">
                                    <div class="icon">${Icons.logOut}</div>
                                    <span style="margin-left: 0.5rem;">Déconnexion</span>
                                </button>
                            </div>

                    <div class="container py-12">
                        <!-- Statistiques -->
                        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 mb-12">
                            <div class="stat-card bg-white">
                                <div class="flex items-center justify-between mb-4">

                                <p class="text-sm text-gray-500">Investisseurs à valider</p>

                                <div class="flex items-center justify-between mb-4">
                                    <div class="icon-lg text-green-600">${Icons.checkCircle}</div>
                                    <span class="text-4xl font-black text-green-600">${approvedInvestors.length}</span>
                                </div>
                                <h3 class="font-bold text-gray-700">Approuvés</h3>
                                <p class="text-sm text-gray-500">Investisseurs validés</p>
                            </div>

                            <div class="stat-card bg-white">
                                <div class="flex items-center justify-between mb-4">
                                    <div class="icon-lg text-red-600">${Icons.xCircle}</div>
                                    <span class="text-4xl font-black text-red-600">${rejectedInvestors.length}</span>

                                <div class="flex items-center justify-between mb-4">

                                    <span class="text-4xl font-black text-blue-600">${porteurs.length}</span>

                                <h3 class="font-bold text-gray-700">Porteurs</h3>
                                <p class="text-sm text-gray-500">Porteurs de projets</p>
                            </div>
                        </div>

                        <!-- Investisseurs en attente -->
                        ${
                          pendingInvestors.length > 0
                            ? `
                            <div class="card bg-white mb-8">
                                <div class="flex items-center gap-3 mb-6">
                                    <div class="icon-lg text-yellow-600">${Icons.alertTriangle}</div>
                                    <h2 class="text-3xl font-black font-display">Investisseurs en attente de validation</h2>
                                </div>

                                <div class="space-y-4">
                                    ${pendingInvestors
                                      .map(
                                        (investor) => `
                                        <div class="p-6 bg-yellow-50 rounded-2xl border-2 border-yellow-200">
                                            <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
                                                <div class="flex-1">
                                                    <h3 class="text-xl font-bold mb-2">${investor.name}</h3>
                                                    <div class="space-y-1 text-sm text-gray-700">
                                                        <p><span class="font-semibold">Email:</span> ${investor.email}</p>
                                                        <p><span class="font-semibold">Ville:</span> ${investor.city}</p>
                                                        <p><span class="font-semibold">Date d'inscription:</span> ${new Date(investor.createdAt).toLocaleDateString("fr-FR")}</p>

                                                    </div>
                                                </div>
                                                <div class="flex flex-col gap-2 w-full md:w-auto">

                                                        <div class="icon">${Icons.eye}</div>
                                                        <span style="margin-left: 0.5rem;">Voir documents</span>
                                                    </button>
                                                    <button onclick="approveInvestor(${investor.id})" class="btn btn-success w-full md:w-auto">

                                                        <span style="margin-left: 0.5rem;">Approuver</span>
                                                    </button>
                                                    <button onclick="rejectInvestor(${investor.id})" class="btn w-full md:w-auto" style="background: #ef4444; color: white;">
                                                        <div class="icon">${Icons.xCircle}</div>
                                                        <span style="margin-left: 0.5rem;">Rejeter</span>
                                                    </button>
                                                </div>
                                            </div>
                                        </div>
                                    `,
                                      )
                                      .join("")}
                                </div>
                            </div>
                        `
                            : `
                            <div class="card bg-white mb-8">
                                <div class="flex items-center gap-3 mb-4">

                                <p class="text-gray-600">Toutes les demandes ont été traitées.</p>

                          approvedInvestors.length > 0
                            ? `

                                <div class="flex items-center gap-3 mb-6">
                                    <div class="icon-lg text-green-600">${Icons.checkCircle}</div>

                                      .map(

                                                <div>
                                                    <h4 class="font-bold">${investor.name}</h4>
                                                    <p class="text-sm text-gray-600">${investor.email} • ${investor.city}</p>
                                                    <p class="text-xs text-green-600 mt-1">✓ Validé le ${new Date(investor.validatedDate).toLocaleDateString("fr-FR")}</p>

                                                <button onclick="viewInvestorDocuments(${investor.id})" class="btn" style="background: white; border: 1px solid #10b981; color: #10b981;">

                                            </div>
                                        </div>

                                <div class="flex items-center gap-3 mb-6">

                                </div>

                                <div class="space-y-3">
                                    ${rejectedInvestors
                                      .map(
                                        (investor) => `
                                        <div class="p-4 bg-red-50 rounded-xl border border-red-200">
                                            <div class="flex justify-between items-center">
                                                <div>
                                                    <h4 class="font-bold">${investor.name}</h4>
                                                    <p class="text-sm text-gray-600">${investor.email} • ${investor.city}</p>
                                                    <p class="text-xs text-red-600 mt-1">✗ Rejeté le ${new Date(investor.rejectionDate).toLocaleDateString("fr-FR")}</p>
                                                    <p class="text-xs text-gray-500 mt-1">Raison: ${investor.rejectionReason}</p>
                                                </div>
                                            </div>
                                        </div>
                                    `,
                                      )
                                      .join("")}
                                </div>
                            </div>
                        `
                            : ""
                        }
                    </div>

                    ${AppState.showDocumentModal ? renderDocumentModal() : ""}
                </div>
            `;
      }

      function renderDocumentModal() {
        const investor = AppState.currentInvestor;
        if (!investor) return "";

        return `
                <div class="modal-backdrop animate-fade-in">
                    <div class="modal animate-scale-in" style="max-width: 700px;">
                        <div class="flex justify-between items-center mb-6">
                            <h3 class="text-3xl font-black font-display">Documents de ${investor.name}</h3>
                            <button onclick="closeDocumentModal()" class="btn" style="width: 2.5rem; height: 2.5rem; padding: 0; background: #f3f4f6; color: #374151; border-radius: 50%;">
                                <div class="icon">${Icons.x}</div>
                            </button>
                        </div>

                        <div class="space-y-6">
                            <!-- Informations personnelles -->
                            <div class="bg-blue-50 rounded-2xl p-6 border-2 border-blue-200">
                                <h4 class="font-bold mb-4 flex items-center gap-2">
                                    <div class="icon text-blue-600">${Icons.users}</div>
                                    Informations personnelles
                                </h4>
                                <div class="space-y-2 text-sm">
                                    <p><span class="font-semibold">Nom complet:</span> ${investor.name}</p>
                                    <p><span class="font-semibold">Email:</span> ${investor.email}</p>
                                    <p><span class="font-semibold">Ville:</span> ${investor.city}</p>
                                    <p><span class="font-semibold">Date d'inscription:</span> ${new Date(investor.createdAt).toLocaleDateString("fr-FR", { dateStyle: "full" })}</p>
                                </div>
                            </div>

                            <!-- Documents financiers -->
                            <div class="bg-purple-50 rounded-2xl p-6 border-2 border-purple-200">
                                <h4 class="font-bold mb-4 flex items-center gap-2">
                                    <div class="icon text-purple-600">${Icons.file}</div>
                                    Documents financiers
                                </h4>
                                <div class="space-y-3">
                                    <div class="bg-white p-4 rounded-xl border border-purple-300">
                                        <div class="flex items-center justify-between">
                                            <div class="flex items-center gap-3">
                                                <div class="icon-lg text-purple-600">${Icons.file}</div>
                                                <div>
                                                    <p class="font-semibold">${investor.financialDocument || "Document non fourni"}</p>
                                                    <p class="text-xs text-gray-500">Document financier (bulletin de salaire ou CA)</p>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                    <p class="text-xs text-gray-600">
                                        <span class="font-semibold">Note:</span> Dans un système de production, vous pourriez visualiser ou télécharger les documents réels ici.
                                    </p>
                                </div>
                            </div>

                            <!-- Accord NDA -->
                            <div class="bg-green-50 rounded-2xl p-6 border-2 border-green-200">
                                <h4 class="font-bold mb-3 flex items-center gap-2">
                                    <div class="icon text-green-600">${Icons.shield}</div>
                                    Confidentialité
                                </h4>
                                <p class="text-sm">
                                    ${
                                      investor.ndaAccepted
                                        ? `✓ Accord de confidentialité accepté le ${new Date(investor.ndaAcceptedDate).toLocaleDateString("fr-FR", { dateStyle: "full" })}`
                                        : "✗ Accord de confidentialité non accepté"
                                    }
                                </p>
                            </div>

                            <!-- Statut actuel -->
                            <div class="bg-gray-50 rounded-2xl p-6 border-2 border-gray-200">
                                <h4 class="font-bold mb-3">Statut actuel</h4>
                                <div class="flex items-center gap-2">
                                    ${
                                      investor.documentsValidated
                                        ? `<span class="px-4 py-2 bg-green-500 text-white rounded-xl font-bold">✓ Approuvé</span>`
                                        : investor.rejectionReason
                                          ? `<span class="px-4 py-2 bg-red-500 text-white rounded-xl font-bold">✗ Rejeté</span>`
                                          : `<span class="px-4 py-2 bg-yellow-500 text-white rounded-xl font-bold">⏳ En attente</span>`
                                    }
                                </div>
                                ${
                                  investor.rejectionReason
                                    ? `
                                    <p class="mt-3 text-sm text-red-600">
                                        <span class="font-semibold">Raison du rejet:</span> ${investor.rejectionReason}
                                    </p>
                                `
                                    : ""
                                }
                            </div>

                            <!-- Actions -->
                            ${
                              !investor.documentsValidated &&
                              !investor.rejectionReason
                                ? `
                                <div class="flex flex-col gap-3">
                                    <button onclick="approveInvestor(${investor.id}); closeDocumentModal();" class="btn btn-success w-full">
                                        <div class="icon">${Icons.check}</div>
                                        <span style="margin-left: 0.5rem;">Approuver cet investisseur</span>
                                    </button>
                                    <button onclick="rejectInvestor(${investor.id}); closeDocumentModal();" class="btn w-full" style="background: #ef4444; color: white;">
                                        <div class="icon">${Icons.xCircle}</div>
                                        <span style="margin-left: 0.5rem;">Rejeter cet investisseur</span>
                                    </button>
                                </div>
                            `
                                : ""
                            }
                            
                            <button onclick="closeDocumentModal()" class="btn w-full" style="background: #e5e7eb; color: #374151;">
                                Fermer
                            </button>
                        </div>
                    </div>
                </div>
            `;
      }

      // ============================================
      // FONCTION DISPLAY MOBILE
      // ============================================
      /**
       * display() — Injecte la navigation mobile en bas de l'écran
       * selon la vue et l'utilisateur connecté.
       * Appelée après chaque render().
       */
      function display() {
        // Remove existing bottom nav
        const existing = document.getElementById("mobileBottomNav");
        if (existing) existing.remove();

        if (!AppState.currentUser) return;
        if (window.innerWidth > 640) return;

        const user = AppState.currentUser;
        let navItems = [];

        if (user.type === "porteur") {
          navItems = [
            {
              label: "Accueil",
              icon: Icons.trending,
              action: "navigateTo('porteur-dashboard')",
              view: "porteur-dashboard",
            },
            {
              label: "Nouveau",
              icon: Icons.plus,
              action: "navigateTo('create-project')",
              view: "create-project",
            },
            { label: "Profil", icon: Icons.users, action: "", view: "" },
            {
              label: "Déconnexion",
              icon: Icons.logOut,
              action: "logout()",
              view: "",
            },
          ];
        } else if (user.type === "investisseur") {
          navItems = [
            {
              label: "Projets",
              icon: Icons.briefcase,
              action: "navigateTo('investisseur-dashboard')",
              view: "investisseur-dashboard",
            },
            {
              label: "Favoris",
              icon: Icons.checkCircle,
              action: "navigateTo('investisseur-dashboard')",
              view: "",
            },
            { label: "Profil", icon: Icons.users, action: "", view: "" },
            {
              label: "Déconnexion",
              icon: Icons.logOut,
              action: "logout()",
              view: "",
            },
          ];
        } else if (user.type === "admin") {
          navItems = [
            {
              label: "Dashboard",
              icon: Icons.settings,
              action: "navigateTo('admin-dashboard')",
              view: "admin-dashboard",
            },
            {
              label: "Projets",
              icon: Icons.briefcase,
              action: "navigateTo('admin-dashboard')",
              view: "",
            },
            {
              label: "Déconnexion",
              icon: Icons.logOut,
              action: "logout()",
              view: "",
            },
          ];
        }

        if (!navItems.length) return;

        const nav = document.createElement("nav");
        nav.id = "mobileBottomNav";
        nav.className = "mobile-bottom-nav";
        nav.innerHTML = navItems
          .map(
            (item) => `
                <button onclick="${item.action}" class="${item.view === AppState.currentView ? "active" : ""}">
                    <span class="nav-icon">${item.icon}</span>
                    <span>${item.label}</span>
                </button>
            `,
          )
          .join("");
        document.body.appendChild(nav);

        // Add bottom padding to the main content
        const app = document.getElementById("app");
        if (app) app.classList.add("has-bottom-nav");
      }

      // ============================================
      // FONCTION PRINCIPALE DE RENDU
      // ============================================
      function render() {
        const app = document.getElementById("app");
        let content = "";

        switch (AppState.currentView) {
          case "landing":
            content = renderLanding();
            break;
          case "choose-profile":
            content = renderChooseProfile();
            break;
          case "signup":
            content = renderSignup();
            break;
          case "porteur-dashboard":
            content = renderPorteurDashboard();
            break;
          case "create-project":
            content = renderCreateProject();
            break;
          case "investisseur-dashboard":
            content = renderInvestisseurDashboard();
            break;
          case "project-detail":
            content = renderProjectDetail();
            break;
          case "admin-dashboard":
            content = renderAdminDashboard();
            break;
          default:
            content = renderLanding();
        }

        app.innerHTML = content;

        // Inject mobile bottom navigation
        display();
      }

      // ============================================
      // INITIALISATION
      // ============================================
      (async function init() {
        try {
          console.log("Prodave: Initialisation...");
          render(); // Affichage immédiat depuis localStorage
          await loadStoredData(); // Puis sync Firebase
          console.log("Prodave: Firebase synchronisé");
        } catch (error) {
          console.error("Prodave: Erreur d'initialisation", error);
          document.getElementById("app").innerHTML = `
                    <div style="padding: 40px; text-align: center;">
                        <h1 style="color: red;">Erreur de chargement</h1>
                        <p>Une erreur s'est produite: ${error.message}</p>
                        <p>Veuillez ouvrir la console (F12) pour plus de détails.</p>
                    </div>
                `;
        }
      })();
    </script>
  </body>
</html>
